name: sphere_hyper

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.10
  - pip
  - pytorch=2.5.*
  - torchvision=0.20.*
  - torchaudio=2.5.*
  - pytorch-cuda=12.1
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - ipython
  - ipykernel
  - tqdm
  - pyyaml
  - pip:
      - einops
      - timm
      - wandb
      - fvcore
      - iopath
      - geoopt
      - torch-fidelity
      - torch-optimizer
      - pytorch-ranger
      - umap-learn
      - opencv-python
      - huggingface-hub
      - safetensors